<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debt Payoff Prioritizer</title>
    <link rel="stylesheet" href="./css/css-reset.css">
    <link rel="stylesheet" href="./css/app.css">
  </head>
  <body>
    <div class="app">
      <div class="app__header">
        <button type="button" id="add-debt__header-btn" title="add debt"></button>
        <span class="cash-input">
          <p>Amount can pay $</p>
          <input type="number">
          <button type="button" id="calculate-btn">Apply</button>
        </span>
      </div>
      <div class="app__body">
        <p class="loading">Loading...</p>
      </div>
    </div>
    <div id="add-debt-modal-container" class="">
      <div id="add-debt-modal">
        <span>
          Name
          <input type="text" id="form-debt-name">
        </span>
        <span>
          Bal
          <input type="number" id="form-debt-bal" placeholder="0.00">
        </span>
        <span>
          AR (interest percent)
          <input type="number" id="form-debt-bal" placeholder="29.99">
        </span>
        <span>
          Due Day
          <input type="number" id="form-debt-due-date" placeholder="day of month">
        </span>
        <span>
          Min pay (per month)
          <input type="number" id="form-debt-min-pay">
        </span>
        <button type="button" id="form-debt-save-btn">Add</button>
      </div>
    </div>
  </body>
</html>
